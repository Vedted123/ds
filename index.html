<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Reader</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Georgia,serif;
}

body{
    background:#f4f4f4;
    overflow:hidden;
}

/* Screens */
.screen{
    display:none;
    width:100vw;
    height:100vh;
}

.screen.active{
    display:flex;
}

/* Home */
#homeScreen{
    justify-content:center;
    align-items:center;
}

#orangeSquare{
    width:220px;
    height:220px;
    background:orange;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

#orangeSquare:hover{
    transform:scale(1.06);
}

/* Reader */
#readerScreen{
    display:none;
    flex-direction:column;
    height:100vh;
}

#topBar{
    background:#222;
    padding:15px;
}

#backBtn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

#book{
    flex:1;
    overflow-y:auto;
    padding:40px;
    background:white;
    white-space:pre-wrap;
    line-height:1.8;
    font-size:20px;
}

/* Hidden File Picker */
#fileInput{
    display:none;
}
</style>

</head>
<body>

<!-- Home Screen -->
<div id="homeScreen" class="screen active">

    <div id="orangeSquare">
        Open Book
    </div>

</div>

<!-- Reader -->
<div id="readerScreen">

    <div id="topBar">
        <button id="backBtn">← Back</button>
    </div>

    <div id="book">
Choose a .txt file...
    </div>

</div>

<input type="file" id="fileInput" accept=".txt">

<script>

const home=document.getElementById("homeScreen");
const reader=document.getElementById("readerScreen");
const fileInput=document.getElementById("fileInput");
const book=document.getElementById("book");

document.getElementById("orangeSquare").onclick=function(){

    fileInput.click();

};

fileInput.onchange=function(){

    const file=this.files[0];

    if(!file) return;

    const readerFile=new FileReader();

    readerFile.onload=function(e){

        book.textContent=e.target.result;

        home.classList.remove("active");
        home.style.display="none";

        reader.style.display="flex";

    };

    readerFile.readAsText(file);

};

document.getElementById("backBtn").onclick=function(){

    reader.style.display="none";

    home.style.display="flex";
    home.classList.add("active");

};

</script>

</body>
</html>
