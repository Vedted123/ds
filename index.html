<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Reader</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Georgia, serif;
}

body{
    background:#f5f5f5;
    overflow:hidden;
}

/* Screens */
.screen{
    display:none;
    width:100vw;
    height:100vh;
}

.screen.active{
    display:flex;
}

/* Home Screen */
#homeScreen{
    justify-content:center;
    align-items:center;
}

/* Orange Square */
#orangeSquare{
    width:220px;
    height:220px;
    background:orange;
    border-radius:15px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    color:white;
    transition:.25s;
    user-select:none;
}

#orangeSquare:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

/* Reader Screen */
#readerScreen{
    display:none;
    flex-direction:column;
    height:100vh;
}

/* Top Bar */
#topBar{
    background:#222;
    color:white;
    padding:15px;
}

#backBtn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:white;
    cursor:pointer;
    font-size:16px;
}

/* Book Text */
#book{
    flex:1;
    overflow-y:auto;
    padding:40px;
    font-size:20px;
    line-height:1.8;
    white-space:pre-wrap;
    background:white;
}
</style>

</head>
<body>

<!-- Home Screen -->
<div id="homeScreen" class="screen active">
    <div id="orangeSquare">
        Open Book
    </div>
</div>

<!-- Reader -->
<div id="readerScreen" class="screen">

    <div id="topBar">
        <button id="backBtn">← Back</button>
    </div>

    <div id="book">
        Loading...
    </div>

</div>

<script>

const home = document.getElementById("homeScreen");
const reader = document.getElementById("readerScreen");

document.getElementById("orangeSquare").onclick = () => {
    home.classList.remove("active");
    reader.style.display = "flex";

    fetch("book.txt")
        .then(response => response.text())
        .then(text => {
            document.getElementById("book").textContent = text;
        })
        .catch(() => {
            document.getElementById("book").textContent =
                "Couldn't find book.txt.\n\nMake sure it's in the same folder as index.html.";
        });
};

document.getElementById("backBtn").onclick = () => {
    reader.style.display = "none";
    home.classList.add("active");
};

</script>

</body>
</html>
